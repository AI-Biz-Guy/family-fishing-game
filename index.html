<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tight Lines</title>
<style>
  :root{
    --gold:#f6b352; --gold-d:#e0913a;
    --ink:#2b2118; --panel:#fffaf0; --panel-2:#fff4dd;
    --common:#7c8a99; --rare:#3f8fce; --legendary:#c558d6;
    --shadow:0 8px 24px rgba(40,25,10,.28);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:#1d2733;
    font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  #game{
    position:relative;
    width:100vw;height:100vh;
    background:#0e1620;
    overflow:hidden;
    user-select:none;
  }
  canvas#c{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:flex-start;gap:8px 10px;flex-wrap:wrap;
    padding:12px 14px;
    pointer-events:none;
    z-index:5;
  }
  #title{
    font-weight:800;font-size:22px;letter-spacing:.5px;
    color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.45);
    white-space:nowrap;flex:0 0 auto;
  }
  #title .hook{filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
  .hud-right{
    margin-left:auto;display:flex;align-items:center;gap:8px;
    flex-wrap:wrap;justify-content:flex-end;
  }
  .pill{
    pointer-events:auto;
    background:rgba(255,250,240,.92);
    border-radius:999px;padding:7px 14px;
    font-weight:700;font-size:14px;color:var(--ink);
    box-shadow:0 3px 10px rgba(0,0,0,.25);
    display:flex;align-items:center;gap:7px;
    border:none;cursor:default;white-space:nowrap;
  }
  button.pill{cursor:pointer;transition:transform .08s ease, background .15s;}
  button.pill:hover{background:#fff;}
  button.pill:active{transform:scale(.95);}
  #logBtn{background:linear-gradient(180deg,#ffe9b0,#f6c560);color:#5a3a12;font-weight:800;
    box-shadow:0 3px 12px rgba(180,120,30,.4);}
  #logBtn:hover{background:linear-gradient(180deg,#fff0c8,#f8cf76);}
  #turn .who{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

  /* ---------- bottom controls ---------- */
  #controls{
    position:absolute;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    padding:0 14px 22px;
    z-index:5;
    pointer-events:none;
  }
  #hint{
    pointer-events:none;
    background:rgba(20,30,40,.55);color:#fff;
    padding:8px 16px;border-radius:999px;font-weight:600;font-size:15px;
    backdrop-filter:blur(2px);text-shadow:0 1px 2px rgba(0,0,0,.4);
    transition:opacity .2s;max-width:90%;text-align:center;
  }
  #spotRow{display:flex;gap:12px;pointer-events:auto;flex-wrap:wrap;justify-content:center;}
  .spot{
    pointer-events:auto;cursor:pointer;
    width:150px;padding:12px 10px;border-radius:16px;border:3px solid transparent;
    background:var(--panel);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:transform .1s ease, border-color .15s, background .15s;
  }
  .spot:hover{transform:translateY(-3px);}
  .spot:active{transform:translateY(0) scale(.98);}
  .spot.sel{border-color:var(--gold);background:var(--panel-2);}
  .spot .ico{font-size:26px;line-height:1;}
  .spot .nm{font-weight:800;font-size:15px;}
  .spot .ds{font-size:11.5px;color:#6b5c49;text-align:center;line-height:1.25;}

  .bigbtn{
    pointer-events:auto;cursor:pointer;border:none;
    background:linear-gradient(180deg,var(--gold),var(--gold-d));
    color:#3a2a12;font-weight:900;font-size:20px;letter-spacing:.5px;
    padding:14px 46px;border-radius:999px;
    box-shadow:0 6px 0 #b9722a, 0 12px 22px rgba(0,0,0,.3);
    transition:transform .06s ease, box-shadow .06s ease;
  }
  .bigbtn:active{transform:translateY(4px);box-shadow:0 2px 0 #b9722a,0 6px 14px rgba(0,0,0,.3);}
  .bigbtn.pulse{animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

  /* reel-in bar + hold button */
  #reelUI{display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:auto;width:100%;}
  #reelBarWrap{width:min(460px,72vw);height:26px;border-radius:999px;overflow:hidden;
    background:rgba(15,25,33,.6);border:2px solid rgba(255,255,255,.3);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);}
  #reelBarFill{height:100%;width:6%;border-radius:999px;
    background:linear-gradient(90deg,#7fe07f,#3fae5a);transition:width .06s linear;}
  #reelBarFill.tug{background:linear-gradient(90deg,#ffb15a,#f07b3a);}
  #actionBtn.reel{background:linear-gradient(180deg,#7fd47f,#3fae5a);box-shadow:0 6px 0 #2f8c46,0 12px 22px rgba(0,0,0,.3);color:#173b1f;}
  #actionBtn.reel:active{box-shadow:0 2px 0 #2f8c46,0 6px 14px rgba(0,0,0,.3);}
  #actionBtn.run{background:linear-gradient(180deg,#ff9a5a,#ef6f3a);box-shadow:0 6px 0 #c4541f,0 12px 22px rgba(0,0,0,.3);color:#3a1c0e;}
  #actionBtn:disabled{opacity:.55;cursor:default;}
  /* prominent turn-change announcement */
  #turnBanner{
    position:absolute;top:70px;left:50%;transform:translate(-50%,-44px) scale(.9);
    z-index:18;pointer-events:none;
    background:rgba(255,250,240,.97);border-radius:18px;padding:14px 26px;
    box-shadow:var(--shadow);border:4px solid var(--gold);
    font-weight:900;font-size:24px;color:var(--ink);white-space:nowrap;
    display:flex;align-items:center;gap:12px;opacity:0;
    transition:opacity .3s ease, transform .35s cubic-bezier(.2,1.3,.4,1);
  }
  #turnBanner.show{opacity:1;transform:translate(-50%,0) scale(1);}
  #turnBanner .em{font-size:30px;line-height:1;}
  /* cast power meter */
  #castUI{display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;width:100%;}
  #castBarWrap{position:relative;width:min(440px,70vw);height:24px;border-radius:999px;overflow:hidden;
    background:rgba(15,25,33,.6);border:2px solid rgba(255,255,255,.3);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.25);}
  #castBarFill{position:absolute;left:0;top:0;height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#9ad8ff,#3f8fce);}
  #castBarFill.perfect{background:linear-gradient(90deg,#9be88a,#3fae5a);}
  #castSweet{position:absolute;top:0;right:0;width:18%;height:100%;background:rgba(120,220,120,.4);border-left:2px dashed rgba(255,255,255,.55);}

  /* ---------- catch card ---------- */
  #catchCard{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(10,18,26,.55);z-index:20;backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  #catchCard.show{opacity:1;pointer-events:auto;}
  .card{
    width:330px;max-width:90%;background:var(--panel);border-radius:22px;
    box-shadow:var(--shadow);padding:18px 20px 20px;text-align:center;
    transform:translateY(24px) scale(.96);transition:transform .3s cubic-bezier(.2,1.3,.4,1);
    border:4px solid #fff;
  }
  #catchCard.show .card{transform:translateY(0) scale(1);}
  .card .banner{font-weight:900;font-size:15px;letter-spacing:2px;color:var(--gold-d);text-transform:uppercase;}
  .card canvas{width:260px;height:150px;margin:2px auto 4px;display:block;}
  .card .fname{font-size:24px;font-weight:900;margin:2px 0 2px;}
  .card .rar{display:inline-block;color:#fff;font-weight:800;font-size:12px;letter-spacing:1px;
    padding:3px 12px;border-radius:999px;text-transform:uppercase;}
  .card .stats{display:flex;justify-content:center;gap:20px;margin:12px 0 4px;}
  .card .stat .v{font-size:22px;font-weight:900;}
  .card .stat .l{font-size:11px;color:#8a7b66;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .card .flav{font-size:14px;color:#6b5c49;margin:8px 4px 14px;line-height:1.35;min-height:19px;}
  .card .by{font-size:12px;color:#9a8b76;margin-top:-8px;margin-bottom:10px;font-weight:600;}

  /* ---------- collection panel ---------- */
  #logPanel,#goalsPanel{
    position:absolute;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;
    background:rgba(10,18,26,.6);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .22s;
  }
  #logPanel.show,#goalsPanel.show{opacity:1;pointer-events:auto;}
  .logbox{
    width:760px;max-width:94%;max-height:88%;overflow:auto;
    background:var(--panel);border-radius:22px;box-shadow:var(--shadow);padding:18px 20px 22px;
    transform:scale(.97);transition:transform .22s;
  }
  #logPanel.show .logbox,#goalsPanel.show .logbox{transform:scale(1);}
  .logbox h2{margin:2px 0 2px;font-size:22px;display:flex;align-items:center;gap:8px;}
  .logbox .sub{color:#8a7b66;font-size:13px;margin-bottom:14px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media (max-width:620px){.grid{grid-template-columns:repeat(2,1fr);}}
  .cell{background:var(--panel-2);border-radius:14px;padding:8px 6px 10px;text-align:center;
    border:2px solid #efe2cb;position:relative;}
  .cell.caught{border-color:#e7cf9e;}
  .cell canvas{width:100%;height:64px;display:block;}
  .cell .cn{font-weight:800;font-size:13px;margin-top:2px;}
  .cell .cs{font-size:11px;color:#8a7b66;font-weight:600;min-height:14px;}
  .cell .badge{position:absolute;top:6px;right:6px;font-size:13px;}
  .cell .rdot{position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;}
  .closeRow{display:flex;justify-content:flex-end;margin-top:16px;}

  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="title"><span class="hook">🎣</span> Tight Lines</div>
    <div class="hud-right">
      <div id="turn" class="pill"></div>
      <div id="progress" class="pill">📘 0/20</div>
      <button id="muteBtn" class="pill" title="Sound">🔊</button>
      <button id="goalsBtn" class="pill" title="Goals (G)">🎯 Goals</button>
      <button id="logBtn" class="pill" title="Logbook">📖 Logbook</button>
    </div>
  </div>

  <div id="controls">
    <div id="hint">Hold SPACE (or the button) to cast! 🎣</div>
    <div id="castUI" class="hidden">
      <div id="castBarWrap"><div id="castBarFill"></div><div id="castSweet"></div></div>
    </div>
    <div id="reelBarWrap" class="hidden"><div id="reelBarFill"></div></div>
    <button id="actionBtn" class="bigbtn">HOLD TO CAST 🎣</button>
  </div>

  <div id="turnBanner"></div>

  <div id="catchCard"><div class="card">
    <div class="banner" id="cardBanner">Nice catch!</div>
    <canvas id="cardFish" width="520" height="300"></canvas>
    <div class="fname" id="cardName">Fish</div>
    <span class="rar" id="cardRar">Common</span>
    <div class="stats">
      <div class="stat"><div class="v" id="cardLen">0"</div><div class="l">Length</div></div>
      <div class="stat"><div class="v" id="cardWt">0 lb</div><div class="l">Weight</div></div>
    </div>
    <div id="cardSize" style="margin:8px 6px 2px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#8a7b66;font-weight:700;">
        <span>🐟 small</span><span id="cardSizePct"></span><span>🏆 max</span>
      </div>
      <div style="position:relative;height:14px;border-radius:999px;background:#efe2cb;overflow:hidden;margin-top:3px;">
        <div id="cardSizeFill" style="position:absolute;left:0;top:0;height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#9be88a,#3fae5a);"></div>
        <div id="cardSizeBest" style="position:absolute;top:-2px;width:2px;height:18px;background:#b8860b;left:0;display:none;"></div>
      </div>
    </div>
    <div id="cardMedal" style="font-weight:800;font-size:14px;margin:6px 0 0;min-height:18px;"></div>
    <div id="cardGoal" style="display:none;font-weight:800;font-size:14px;color:#2f8c46;margin-top:3px;"></div>
    <div class="flav" id="cardFlav"></div>
    <div class="by" id="cardBy"></div>
    <button class="bigbtn" id="cardBtn">Next cast →</button>
  </div></div>

  <div id="logPanel"><div class="logbox">
    <h2>📖 The Logbook</h2>
    <div class="sub" id="logSub">Every fish you and your buddy reel in shows up here.</div>
    <div class="grid" id="logGrid"></div>
    <div class="closeRow"><button class="bigbtn" id="logClose">Back to fishing</button></div>
  </div></div>

  <div id="goalsPanel"><div class="logbox">
    <h2>🎯 Goals</h2>
    <div class="sub" id="goalsSub"></div>
    <div id="goalsList"></div>
    <div class="closeRow"><button class="bigbtn" id="goalsClose">Back to fishing</button></div>
  </div></div>
</div>

<script>
"use strict";
/* ============================================================
   TIGHT LINES — a cozy take-turns fishing game (Dad & Son)
   Single-file, no dependencies. Sections:
     1. Utilities & seeded RNG
     2. Fish data + Canvas illustrations
     3. Audio (WebAudio, no files)
     4. Game state + persistence
     5. Scene & fish rendering
     6. Reel-in fight mechanic
     7. Game flow (cast / bite / fight / catch)
     8. UI wiring + main loop
   ============================================================ */

/* ---------- 1. Utilities ---------- */
const TAU = Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const pick=arr=>arr[(Math.random()*arr.length)|0];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// generate N deterministic marking points within a body box
function speck(seed,n,opts={}){
  const r=mulberry32(seed),pts=[];
  for(let i=0;i<n;i++){pts.push({x:lerp(opts.x0??-.42,opts.x1??.30,r()),y:(r()*2-1)*(opts.yr??.7),s:lerp(opts.s0??.7,opts.s1??1.4,r())});}
  return pts;
}

/* ---------- 2. Fish data ---------- */
/* Each species: realistic colours, proportions, fins & markings.
   Lengths in inches; weight from length^3 * wt coefficient.        */
const RARITY={
  common:{c:'#7c8a99',label:'Common'},
  rare:{c:'#3f8fce',label:'Rare'},
  legendary:{c:'#c558d6',label:'Legendary'},
};
const FISH=[
  {
    id:'bass',name:'Largemouth Bass',rarity:'common',
    minLen:9,maxLen:21,wt:.00060,
    depth:.30,snout:'big',tail:'fork-soft',dorsal:'split',adipose:false,barbel:false,
    back:'#3f6b3a',mid:'#7fa05a',belly:'#eef2d6',eye:'#caa23a',
    weights:{weeds:3.2,deep:.4,lure:1.4},
    pattern(ctx,L){ // jagged dark lateral band
      ctx.fillStyle='rgba(35,55,30,.55)';
      ctx.beginPath();let x=-.42*L;ctx.moveTo(x,-.02*L);
      for(let i=0;i<7;i++){x=lerp(-.42,.34,i/6)*L;ctx.lineTo(x,(i%2?.05:-.04)*L);}
      for(let i=6;i>=0;i--){x=lerp(-.42,.34,i/6)*L;ctx.lineTo(x,(i%2?.10:.02)*L);}
      ctx.closePath();ctx.fill();
    },
    flav:["Big mouth, bigger attitude — loves the weeds.","A weedline bruiser. Great fight on light line."],
  },
  {
    id:'rainbow',name:'Rainbow Trout',rarity:'common',
    minLen:10,maxLen:22,wt:.00045,
    depth:.24,snout:'round',tail:'fork',adipose:true,barbel:false,dorsal:'single',
    back:'#5f7d86',mid:'#b9c6cc',belly:'#f6f7f4',eye:'#1c1c1c',
    weights:{weeds:1.0,deep:1.2,lure:2.0},
    stripe:'#e2607e',
    pattern(ctx,L){
      const g=ctx.createLinearGradient(0,-.05*L,0,.05*L);
      g.addColorStop(0,'rgba(226,96,126,0)');g.addColorStop(.5,'rgba(226,96,126,.75)');g.addColorStop(1,'rgba(226,96,126,0)');
      ctx.fillStyle=g;ctx.fillRect(-.45*L,-.06*L,.78*L,.12*L);
      ctx.fillStyle='rgba(20,30,35,.55)';
      for(const p of speck(11,60,{x0:-.45,x1:.32,yr:.78,s0:.45,s1:1.0})){
        ctx.beginPath();ctx.ellipse(p.x*L,p.y*L*.5,p.s*1.1,p.s*1.0,0,0,TAU);ctx.fill();}
    },
    flav:["Chrome sides, pink stripe — a classic.","Acrobatic jumper. Pretty as a postcard."],
  },
  {
    id:'walleye',name:'Walleye',rarity:'common',
    minLen:12,maxLen:26,wt:.00035,
    depth:.21,snout:'point',tail:'fork',adipose:false,barbel:false,dorsal:'spiny2',
    back:'#7c7a3a',mid:'#c9bd6a',belly:'#f3efd4',eye:'#f4efe0',pupil:'#b9b079',
    glassyEye:true,
    weights:{weeds:2.2,deep:2.6,lure:1.2},
    pattern(ctx,L){
      ctx.fillStyle='rgba(60,55,20,.4)';
      for(let i=0;i<6;i++){const x=lerp(-.4,.28,i/5)*L;ctx.save();ctx.translate(x,0);ctx.rotate(.12);
        ctx.fillRect(-1.2,-.18*L,2.4,.34*L);ctx.restore();}
    },
    flav:["Glassy eyes that glow at dusk.","Golden flanks — best eatin' on the lake, Dad says."],
  },
  {
    id:'pike',name:'Northern Pike',rarity:'common',
    minLen:20,maxLen:38,wt:.00030,
    depth:.17,snout:'duck',tail:'fork',adipose:false,barbel:false,dorsal:'rear',
    back:'#5a6f33',mid:'#8aa14c',belly:'#f0efcf',eye:'#d8b24a',
    weights:{weeds:3.0,deep:.6,lure:2.2},
    pattern(ctx,L){ // rows of light bean spots
      ctx.fillStyle='rgba(240,240,205,.85)';
      for(const p of speck(7,46,{x0:-.42,x1:.28,yr:.62,s0:.9,s1:1.6})){
        ctx.save();ctx.translate(p.x*L,p.y*L*.55);ctx.rotate(.2);
        ctx.beginPath();ctx.ellipse(0,0,p.s*1.7,p.s*.9,0,0,TAU);ctx.fill();ctx.restore();}
    },
    flav:["The water wolf. All teeth and ambush.","Long, mean, and lightning fast."],
  },
  {
    id:'salmon',name:'Salmon',rarity:'rare',
    minLen:18,maxLen:36,wt:.00050,
    depth:.23,snout:'kype',tail:'fork',adipose:true,barbel:false,dorsal:'single',
    back:'#566b74',mid:'#c3ccc9',belly:'#f6f6f2',eye:'#1c1c1c',
    weights:{weeds:.6,deep:1.6,lure:2.2},
    pattern(ctx,L){
      ctx.fillStyle='rgba(25,35,40,.6)';
      for(const p of speck(21,34,{x0:-.44,x1:.30,yr:.5,s0:.6,s1:1.3})){
        if(p.y>0)continue;ctx.beginPath();ctx.ellipse(p.x*L,p.y*L*.55,p.s*1.2,p.s*1.2,0,0,TAU);ctx.fill();}
    },
    flav:["Hard chrome runner — hold on tight!","Migrates miles. A real prize on the line."],
  },
  {
    id:'cod',name:'Cod',rarity:'rare',
    minLen:18,maxLen:36,wt:.00055,
    depth:.27,snout:'round',tail:'fan',adipose:false,barbel:true,dorsal:'triple',
    back:'#6b6240',mid:'#a99c66',belly:'#efe7cf',eye:'#2a2a2a',lat:'#f3eecf',
    weights:{weeds:.5,deep:2.4,lure:.8},
    pattern(ctx,L){
      ctx.fillStyle='rgba(70,60,35,.5)';
      for(const p of speck(31,70,{x0:-.46,x1:.34,yr:.82,s0:.5,s1:1.2})){
        ctx.beginPath();ctx.ellipse(p.x*L,p.y*L*.55,p.s,p.s,0,0,TAU);ctx.fill();}
    },
    flav:["Whiskered chin and three sails on its back.","Deep-water heavyweight."],
  },
  {
    id:'laketrout',name:'Lake Trout',rarity:'rare',
    minLen:18,maxLen:36,wt:.00045,
    depth:.22,snout:'point',tail:'fork-deep',adipose:true,barbel:false,dorsal:'single',
    back:'#445048',mid:'#7d8a82',belly:'#e9ece6',eye:'#1c1c1c',
    weights:{weeds:.3,deep:3.2,lure:.9},
    pattern(ctx,L){ // pale worm-track vermiculations
      ctx.strokeStyle='rgba(235,240,230,.8)';ctx.lineWidth=1.4;
      const r=mulberry32(41);
      for(let i=0;i<40;i++){const x=lerp(-.45,.32,r())*L,y=(r()*2-1)*.55*L*.55;

/* ----- the fish illustrator (shared by scene, card, logbook) ----- */
function drawFish(ctx,sp,cx,cy,L,dir=1){
  const D=L*sp.depth, ped=L*0.055;
  const nx=0.5*L;                 // nose x (facing right)
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(dir,1);

  // ----- caudal (tail) fin -----
  ctx.fillStyle=sp.back;
  ctx.beginPath();
  const tx=-0.46*L;
  if(sp.tail==='fan'){
    ctx.moveTo(tx,-ped);ctx.lineTo(-0.52*L,-D*0.7);ctx.lineTo(-0.55*L,0);ctx.lineTo(-0.52*L,D*0.7);ctx.lineTo(tx,ped);
  }else{
    const spread=(sp.tail==='fork-deep'?D*1.15:sp.tail==='fork'?D*0.95:D*0.7);
    const inset=(sp.tail==='fork-deep'?0.40:0.43)*L;
    ctx.moveTo(tx,-ped);ctx.lineTo(-0.55*L,-spread);ctx.lineTo(-inset,0);ctx.lineTo(-0.55*L,spread);ctx.lineTo(tx,ped);
  }
  ctx.closePath();ctx.fill();

  // ----- body silhouette path -----
  const body=new Path2D();
  const topPeak = sp.snout==='big'? -D*1.02 : -D*1.0;
  body.moveTo(nx,0);
  body.bezierCurveTo(nx-0.10*L, topPeak*0.55, 0.10*L, topPeak, -0.18*L, -D*0.78);
  body.lineTo(tx,-ped);
  body.lineTo(tx, ped);
  const belly = sp.snout==='big'? D*1.06 : D*0.96;
  body.bezierCurveTo(-0.18*L, belly, 0.12*L, belly*1.0, nx, 0);
  body.closePath();

  // body gradient (back -> belly)
  const g=ctx.createLinearGradient(0,-D,0,D);
  g.addColorStop(0,sp.back);g.addColorStop(0.5,sp.mid);g.addColorStop(1,sp.belly);
  ctx.fillStyle=g;ctx.fill(body);

  // markings, clipped to body
  ctx.save();ctx.clip(body);
  if(sp.pattern)sp.pattern(ctx,L);
  // lateral line for cod-like
  if(sp.lat){ctx.strokeStyle=sp.lat;ctx.lineWidth=1.4;ctx.beginPath();
    ctx.moveTo(-0.44*L,-.02*L);ctx.quadraticCurveTo(0,-.16*L,0.34*L,-.04*L);ctx.stroke();}
  // soft top shading for roundness
  const sh=ctx.createLinearGradient(0,-D,0,0);sh.addColorStop(0,'rgba(0,0,0,.18)');sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh;ctx.fillRect(-0.5*L,-D,L,D);
  ctx.restore();

  // body outline
  ctx.strokeStyle='rgba(30,25,15,.35)';ctx.lineWidth=1.3;ctx.stroke(body);

  // ----- fins (drawn over body where appropriate) -----
  ctx.fillStyle=sp.back;ctx.globalAlpha=.92;
  // pectoral
  ctx.beginPath();ctx.moveTo(0.16*L,D*0.18);ctx.quadraticCurveTo(0.05*L,D*0.62,0.20*L,D*0.5);ctx.closePath();ctx.fill();
  // pelvic / anal
  ctx.beginPath();ctx.moveTo(-0.06*L,D*0.6);ctx.quadraticCurveTo(-0.16*L,D*1.0,-0.02*L,D*0.78);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;

  // dorsal fins by type
  ctx.fillStyle=sp.back;
  const dorsalSpiny=()=>{ctx.beginPath();ctx.moveTo(0.12*L,-D*0.78);
    for(let i=0;i<=5;i++){const x=lerp(0.12,-0.04,i/5)*L;ctx.lineTo(x,-D*(0.78+(i%2?0.42:0.08)));}
    ctx.lineTo(-0.04*L,-D*0.78);ctx.closePath();ctx.fill();};
  if(sp.dorsal==='spiny2'||sp.dorsal==='split'){
    dorsalSpiny();
    ctx.beginPath();ctx.moveTo(-0.08*L,-D*0.82);ctx.quadraticCurveTo(-0.20*L,-D*1.3,-0.26*L,-D*0.8);ctx.closePath();ctx.fill();
  }else if(sp.dorsal==='rear'){
    ctx.beginPath();ctx.moveTo(-0.18*L,-D*0.74);ctx.quadraticCurveTo(-0.30*L,-D*1.35,-0.36*L,-D*0.72);ctx.closePath();ctx.fill();
  }else if(sp.dorsal==='triple'){
    for(const cx2 of [0.18,-0.02,-0.22]){ctx.beginPath();ctx.moveTo(cx2*L,-D*0.78);
      ctx.quadraticCurveTo((cx2-0.06)*L,-D*1.18,(cx2-0.11)*L,-D*0.76);ctx.closePath();ctx.fill();}
  }else{ // single
    ctx.beginPath();ctx.moveTo(0.10*L,-D*0.8);ctx.quadraticCurveTo(0.0,-D*1.32,-0.10*L,-D*0.78);ctx.closePath();ctx.fill();
  }
  // adipose fin (little nub near tail) for trout/salmon
  if(sp.adipose){ctx.beginPath();ctx.ellipse(-0.34*L,-D*0.7,L*0.02,L*0.035,0,0,TAU);ctx.fill();}

  // ----- head details -----
  // gill plate
  ctx.strokeStyle='rgba(25,20,12,.3)';ctx.lineWidth=1.3;
  ctx.beginPath();ctx.moveTo(0.30*L,-D*0.55);ctx.quadraticCurveTo(0.24*L,0,0.30*L,D*0.55);ctx.stroke();
  // mouth
  ctx.strokeStyle='rgba(25,20,12,.55)';ctx.lineWidth=1.6;ctx.beginPath();
  if(sp.snout==='duck'){ctx.moveTo(nx,0);ctx.lineTo(0.30*L,D*0.02);}
  else if(sp.snout==='kype'){ctx.moveTo(nx,-.01*L);ctx.quadraticCurveTo(0.42*L,D*0.12,0.32*L,D*0.08);}
  else if(sp.snout==='big'){ctx.moveTo(nx,0);ctx.quadraticCurveTo(0.40*L,D*0.16,0.22*L,D*0.10);}
  else{ctx.moveTo(nx,0);ctx.lineTo(0.36*L,D*0.04);}
  ctx.stroke();
  // chin barbel (cod)
  if(sp.barbel){ctx.beginPath();ctx.moveTo(0.44*L,D*0.06);ctx.lineTo(0.46*L,D*0.16);ctx.lineWidth=1.6;ctx.stroke();}
  // whiskers / barbels (catfish, carp, sturgeon)
  if(sp.whiskers){ctx.strokeStyle='rgba(35,28,18,.7)';ctx.lineWidth=1.3;ctx.lineCap='round';
    for(let i=0;i<sp.whiskers;i++){const a=sp.whiskers>1?i/(sp.whiskers-1):0;const sy=lerp(-D*0.05,D*0.22,a);
      ctx.beginPath();ctx.moveTo(0.46*L,sy);ctx.quadraticCurveTo(0.60*L,sy+0.05*L,0.50*L,sy+0.18*L);ctx.stroke();}}

  // eye
  const ex=0.36*L, ey=-D*0.34, er=Math.max(2.6,L*0.035);
  if(sp.glassyEye){ // walleye reflective
    ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(ex,ey,er*1.25,0,TAU);ctx.fill();
    ctx.fillStyle=sp.pupil;ctx.beginPath();ctx.arc(ex,ey,er*0.7,0,TAU);ctx.fill();
  }else{
    ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(ex,ey,er,0,TAU);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex,ey,er*0.55,0,TAU);ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(ex-er*0.3,ey-er*0.3,er*0.28,0,TAU);ctx.fill();

  ctx.restore();
}
// pick a draw length that fits a fish (incl. deep-bodied panfish) inside a box
function fitL(sp,boxW,boxH){return Math.min(boxW/1.25, boxH/(sp.depth*2.7));}

/* ---------- 3. Audio (WebAudio, generated) ---------- */
const Sound=(()=>{
  let ctx=null, muted=false, ambGain=null;
  function ensure(){
    if(!ctx){try{ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
    if(ctx.state==='suspended')ctx.resume();
    return ctx;
  }
  function tone(f,t0,dur,type='sine',vol=.2,slideTo){
    const c=ensure();if(!c||muted)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.setValueAtTime(f,c.currentTime+t0);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+t0+dur);
    g.gain.setValueAtTime(0,c.currentTime+t0);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008,c.currentTime+t0+dur);
    o.connect(g).connect(c.destination);o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+0.05);
  }
  function noise(t0,dur,vol=.25,lp=900){
    const c=ensure();if(!c||muted)return;
    const n=Math.floor(c.sampleRate*dur),buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=c.createBufferSource();s.buffer=buf;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=lp;
    const g=c.createGain();g.gain.value=vol;
    s.connect(f).connect(g).connect(c.destination);s.start(c.currentTime+t0);
  }
  function startAmbient(){
    const c=ensure();if(!c)return;
    if(ambGain)return;
    const n=c.sampleRate*2,buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=420;
    ambGain=c.createGain();ambGain.gain.value=muted?0:.035;
    const lfo=c.createOscillator(),lg=c.createGain();lfo.frequency.value=.15;lg.gain.value=.02;
    lfo.connect(lg).connect(ambGain.gain);lfo.start();
    s.connect(f).connect(ambGain).connect(c.destination);s.start();
  }
  return {
    init(){ensure();startAmbient();},
    cast(){noise(0,.18,.3,1400);tone(420,.02,.12,'triangle',.12,640);},
    reelTick(){noise(0,0.016,0.05,2000);tone(150,0,0.035,'triangle',0.035);},
    reelRun(intensity=0){
      const base=380-intensity*150;            // bigger fish -> deeper drag scream
      tone(base,0,0.20+intensity*0.10,'triangle',0.05+intensity*0.03,base*0.45);
      if(intensity>0.5)noise(0,0.18,0.06+intensity*0.05,300);   // low rumble bed
    },
    bite(intensity=0){
      const lo=660-intensity*220;          // bigger fish -> lower, heavier knock
      tone(lo,0,.08,'sine',.18);
      tone(lo*1.33,.09,.10,'sine',.16);
      if(intensity>0.5){noise(.02,.12,.18+intensity*0.12,600);}
    },
    splash(){noise(0,.35,.4,1100);noise(.05,.3,.3,700);},
    plop(){noise(0,.14,.28,800);tone(300,0,.1,'sine',.1,170);},
    chime(){[523,659,784,1047].forEach((f,i)=>tone(f,i*0.09,.4,'sine',.16));},
    fanfare(tier=1){
      const seq = tier>=3 ? [523,659,784,1047,1319] : tier>=2 ? [523,659,784,1047] : [523,659,784];
      seq.forEach((f,i)=>tone(f,i*0.08,.45,'sine',.16));
      if(tier>=3){ [1568,1976].forEach((f,i)=>tone(f,0.45+i*0.07,.5,'triangle',.10)); }  // sparkle topper
    },
    fail(){tone(300,0,.25,'sawtooth',.12,140);},
    setMuted(m){muted=m;if(ambGain)ambGain.gain.value=m?0:.035;},
    get muted(){return muted;}
  };
})();

};
const G={

  spot:null,            // weeds | deep | lure
  t:0, modeT:0, shake:0, slowmo:0, breakFocus:null, cardReadyAt:0, biteAt:0, hookWindow:0,

  // animated bits
  rodBend:{dad:0,son:0}, bob:{dad:0,son:0}, lineOut:0,

};
function load(){
  try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.collection){
    const c=s.collection, clean={};
    for(const id in c){ if(!FISH_BY_ID[id])continue; const r=c[id]||{};
      clean[id]={count:(+r.count)||1, bestLen:(+r.bestLen)||0, bestWt:(+r.bestWt)||0, firstBy:(r.firstBy==='son'?'son':'dad')};
    }
    G.collection=clean;
  }}catch(e){}
}
function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({collection:G.collection}));}catch(e){}
}
const caughtCount=()=>Object.keys(G.collection).length;

/* ---------- 5. Scene rendering ---------- */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  const r=cv.getBoundingClientRect();DPR=Math.min(2,window.devicePixelRatio||1);
  W=r.width;H=r.height;cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

function waterY(){return H*0.66;}

/* decorative elements with stable positions (relative 0..1, seeded) */
const DECOR={
  sparkles:Array.from({length:80},(_,i)=>{const r=mulberry32(900+i);return{x:r(),y:r(),ph:r()*TAU,sp:0.6+r()*1.3,sz:0.6+r()*1.2};}),
  fireflies:Array.from({length:18},(_,i)=>{const r=mulberry32(1300+i);return{x:r(),y:r(),ph:r()*TAU,sp:0.3+r()*0.7,drift:r()*TAU};}),
  pines:Array.from({length:26},(_,i)=>{const r=mulberry32(500+i);return{x:r(),h:0.4+r()*1.0,w:0.5+r()*0.7,k:r()};}),
  birds:Array.from({length:5},(_,i)=>{const r=mulberry32(1700+i);return{x:r(),y:0.10+r()*0.28,sp:0.3+r()*0.5,ph:r()*TAU,sz:0.7+r()*0.6};}),
  reeds:Array.from({length:9},(_,i)=>{const r=mulberry32(2100+i);return{x:r(),h:0.5+r()*0.9,k:r(),lean:(r()-0.5)*0.5};}),
};
let SUN={x:0,y:0,r:0};

function drawScene(t){
  const wy=waterY();
  drawSky(t,wy);
  drawSun(t,wy);
  drawBirds(t,wy);
  drawClouds(t,wy);
  drawMountains(t,wy);
  drawTreelineScene(t,wy);
  drawWater(t,wy);
  drawLilies(t,wy);
  drawLoon(t,wy);
  updateJumpers(t,wy);
  drawGrandpaEd(t,wy);
  drawDock(t);
  drawReeds(t,wy);
  drawFireflies(t,wy);
  // gameplay particles
  for(const s of G.splashes){ctx.fillStyle=`rgba(230,245,250,${clamp(s.life,0,1)})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TAU);ctx.fill();}
  for(const c of G.confetti){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);
    ctx.fillStyle=c.col;ctx.fillRect(-3,-3,6,6);ctx.restore();}
}

function drawSky(t,wy){
  const sky=ctx.createLinearGradient(0,0,0,wy);
  sky.addColorStop(0,'#6f86b8');sky.addColorStop(0.32,'#b89bb0');
  sky.addColorStop(0.58,'#f0b07c');sky.addColorStop(0.82,'#f6a064');sky.addColorStop(1,'#f4906c');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,wy);
  // warm horizon haze
  const hg=ctx.createLinearGradient(0,wy*0.66,0,wy);
  hg.addColorStop(0,'rgba(255,222,162,0)');hg.addColorStop(1,'rgba(255,228,176,0.55)');
  ctx.fillStyle=hg;ctx.fillRect(0,wy*0.66,W,wy*0.34);
}
function drawSun(t,wy){
  const sx=W*0.72, sy=wy*0.40, sr=Math.min(W,H)*0.085;
  SUN={x:sx,y:sy,r:sr};
  let g=ctx.createRadialGradient(sx,sy,sr*0.3,sx,sy,sr*3.6);
  g.addColorStop(0,'rgba(255,240,200,0.55)');g.addColorStop(0.45,'rgba(255,213,150,0.26)');g.addColorStop(1,'rgba(255,200,140,0)');
  ctx.fillStyle=g;ctx.fillRect(sx-sr*3.6,sy-sr*3.6,sr*7.2,sr*7.2);
  g=ctx.createRadialGradient(sx,sy,sr*0.1,sx,sy,sr);
  g.addColorStop(0,'#fff9e4');g.addColorStop(0.7,'#ffeec0');g.addColorStop(1,'rgba(255,231,178,0.9)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,sr,0,TAU);ctx.fill();
}
function drawBirds(t,wy){
  ctx.strokeStyle='rgba(55,50,66,0.45)';ctx.lineWidth=1.6;ctx.lineCap='round';
  for(const b of DECOR.birds){
    const x=((b.x*W + t*b.sp*26)%(W+80))-40, y=wy*b.y+Math.sin(t*0.5+b.ph)*4, s=4*b.sz;
    const flap=Math.sin(t*5+b.ph)*0.5+0.5;
    ctx.beginPath();ctx.moveTo(x-s,y+s*flap);ctx.lineTo(x,y-s*0.3);ctx.lineTo(x+s,y+s*flap);ctx.stroke();
  }
}
function drawClouds(t,wy){
  for(let i=0;i<4;i++){
    const cx=((t*4+i*330+i*111)%(W+340))-170, cy=wy*(0.15+i*0.11), sc=34+i*13;
    const puffs=[[0,5,sc*0.62],[sc*0.62,8,sc*0.5],[-sc*0.62,9,sc*0.46],[sc*0.12,-sc*0.32,sc*0.5]];
    // warm underside, then the body — each filled as a single union (no overlap seams)
    ctx.save();
    ctx.globalAlpha=0.5;ctx.fillStyle='#ffca90';ctx.beginPath();
    for(const [dx,dy,r] of puffs){ctx.moveTo(cx+dx+r,cy+dy+5);ctx.arc(cx+dx,cy+dy+5,r,0,TAU);}ctx.fill();
    ctx.globalAlpha=0.82;ctx.fillStyle='#fdf4ea';ctx.beginPath();
    for(const [dx,dy,r] of puffs){ctx.moveTo(cx+dx+r,cy+dy);ctx.arc(cx+dx,cy+dy,r,0,TAU);}ctx.fill();
    ctx.restore();
  }
}
function drawMountains(t,wy){
  const layers=[
    {h:0.17,col:'#c7a6c2',amp:0.5,freq:0.0035,ph:0.4},
    {h:0.14,col:'#b08c8a',amp:0.6,freq:0.0058,ph:1.9},
    {h:0.105,col:'#8a7a5a',amp:0.7,freq:0.0092,ph:3.3},
  ];
  for(const L of layers){
    const hh=H*L.h;ctx.fillStyle=L.col;
    ctx.beginPath();ctx.moveTo(0,wy);
    for(let x=0;x<=W;x+=16){const y=wy-hh+Math.sin(x*L.freq+L.ph)*hh*L.amp+Math.sin(x*L.freq*2.4+L.ph)*hh*0.16;ctx.lineTo(x,y);}
    ctx.lineTo(W,wy);ctx.closePath();ctx.fill();
  }
}
function drawTreelineScene(t,wy){
  ctx.fillStyle='#4d5b38';
  ctx.beginPath();ctx.moveTo(0,wy);
  for(let x=0;x<=W;x+=10){const y=wy-5-Math.abs(Math.sin(x*0.05))*7;ctx.lineTo(x,y);}
  ctx.lineTo(W,wy);ctx.closePath();ctx.fill();
  for(const p of DECOR.pines){
    const x=p.x*W, base=wy-2, h=16+p.h*30, w=7+p.w*8;
    pine(x,base,h,w, p.k<0.5?'#43542f':'#384a2a');
  }
}
function pine(x,base,h,w,col){
  ctx.fillStyle='#3a2c1f';ctx.fillRect(x-1.5,base-5,3,7);
  ctx.fillStyle=col;
  for(let i=0;i<3;i++){const ty=base-5-i*(h*0.30), tw=w*(1-i*0.22), th=h*0.44;
    ctx.beginPath();ctx.moveTo(x,ty-th);ctx.lineTo(x-tw,ty);ctx.lineTo(x+tw,ty);ctx.closePath();ctx.fill();}
}
function drawWater(t,wy){
  const wg=ctx.createLinearGradient(0,wy,0,H);
  wg.addColorStop(0,'#5e9aa0');wg.addColorStop(0.5,'#2f7080');wg.addColorStop(1,'#163c52');
  ctx.fillStyle=wg;ctx.fillRect(0,wy,W,H-wy);
  // warm sky reflection just below the waterline
  const rb=ctx.createLinearGradient(0,wy,0,wy+(H-wy)*0.22);
  rb.addColorStop(0,'rgba(244,158,108,0.45)');rb.addColorStop(1,'rgba(244,158,108,0)');
  ctx.fillStyle=rb;ctx.fillRect(0,wy,W,(H-wy)*0.22);
  // wavering treeline reflection
  ctx.save();ctx.globalAlpha=0.20;ctx.fillStyle='#2b3a22';
  ctx.beginPath();ctx.moveTo(0,wy);
  for(let x=0;x<=W;x+=10){const o=Math.sin(x*0.05+t*1.4)*1.6;ctx.lineTo(x,wy+5+Math.abs(Math.sin(x*0.05))*7+o);}
  ctx.lineTo(W,wy);ctx.closePath();ctx.fill();ctx.restore();
  // sun reflection path on the water
  ctx.save();ctx.beginPath();ctx.rect(0,wy,W,H-wy);ctx.clip();
  for(let i=0;i<30;i++){const f=i/30, yy=wy+f*(H-wy), w=lerp(SUN.r*0.5,SUN.r*2.6,f);
    const ph=Math.sin(t*2.3+i*0.8), a=(0.10+0.13*Math.abs(ph))*(1-f*0.35);
    ctx.fillStyle=`rgba(255,235,188,${a})`;ctx.fillRect(SUN.x-w/2+ph*10,yy,w,2.6);}
  ctx.restore();
  // perspective ripple lines
  ctx.strokeStyle='rgba(255,255,255,0.10)';
  for(let i=0;i<9;i++){const f=(i+1)/10, yy=wy+f*(H-wy), amp=1.4+f*3.4;ctx.lineWidth=1+f;
    ctx.beginPath();for(let x=0;x<=W;x+=12){const o=Math.sin(x*(0.02+f*0.01)+t*1.6+i)*amp;x===0?ctx.moveTo(x,yy+o):ctx.lineTo(x,yy+o);}ctx.stroke();}
  // twinkling specular sparkles (denser near the sun path)
  for(const sp of DECOR.sparkles){
    const x=sp.x*W, y=wy+sp.y*(H-wy), tw=Math.sin(t*sp.sp*3+sp.ph);
    if(tw>0.55){const near=(x>SUN.x-120&&x<SUN.x+120)?1.7:1;
      ctx.fillStyle=`rgba(255,250,228,${(tw-0.55)*0.95})`;ctx.fillRect(x,y,sp.sz*1.7*near,sp.sz);}
  }
}
function drawLilies(t,wy){
  const pads=[[0.40,0.30,22],[0.52,0.18,15],[0.46,0.46,26],[0.62,0.36,18]];
  for(const [px,py,r] of pads){
    const x=px*W, y=wy+py*(H-wy)+Math.sin(t+px*20)*2;
    lilypad(x,y,r,((px*py*100)%1)>0.6);
  }
}
function lilypad(x,y,r,flower){
  ctx.fillStyle='#3c7a48';ctx.beginPath();ctx.ellipse(x,y,r,r*0.5,0,0.35,TAU-0.35);ctx.closePath();ctx.fill();
  ctx.fillStyle='#326a3e';ctx.beginPath();ctx.ellipse(x,y,r,r*0.5,0,0.35,1.0);ctx.lineTo(x,y);ctx.fill();
  ctx.strokeStyle='rgba(20,40,25,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+r*0.7,y-r*0.08);ctx.stroke();
  if(flower){ctx.fillStyle='#f3d7e6';for(let k=0;k<6;k++){const ang=k/6*TAU;
      ctx.beginPath();ctx.ellipse(x+Math.cos(ang)*r*0.18,y-r*0.2+Math.sin(ang)*r*0.09,r*0.12,r*0.06,ang,0,TAU);ctx.fill();}
    ctx.fillStyle='#f4c542';ctx.beginPath();ctx.arc(x,y-r*0.2,r*0.07,0,TAU);ctx.fill();}
}
function drawLoon(t,wy){
  G.loonX+=0.25; if(G.loonX>W+120)G.loonX=-120;
  const x=G.loonX, y=wy+(H-wy)*0.07+Math.sin(t*0.8)*2;
  ctx.save();ctx.globalAlpha=0.22;ctx.translate(x,y+13);ctx.scale(1,-1);ctx.translate(-x,-y);loonBody(x,y);ctx.restore();
  loonBody(x,y);
  ctx.strokeStyle='rgba(255,255,255,0.16)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(x-6,y+7,22,5,0,0,Math.PI);ctx.stroke();
}
function loonBody(x,y){ctx.save();ctx.translate(x,y);
  ctx.fillStyle='#1b2330';ctx.beginPath();ctx.ellipse(0,0,16,7,0,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(13,-7,5,6,0,0,TAU);ctx.fill();
  ctx.fillStyle='#10161f';ctx.fillRect(16,-8,8,2.2);
  ctx.fillStyle='#fff';for(let i=-6;i<8;i+=3)ctx.fillRect(i,-2,1.6,1.6);
  ctx.fillStyle='#b51f2a';ctx.beginPath();ctx.arc(14,-8,1.1,0,TAU);ctx.fill();
  ctx.restore();}
function updateJumpers(t,wy){
  G.jumpTimer-=1/60;
  if(G.jumpTimer<=0){G.jumpTimer=rnd(4,9);
    G.jumpers.push({x:rnd(W*0.40,W*0.95),y0:wy+rnd(16,80),age:0,dur:rnd(0.7,1.0),peak:rnd(26,50),dir:Math.random()<0.5?1:-1});}
  for(const j of G.jumpers){j.age+=1/60;const p=j.age/j.dur;if(p>=1)continue;
    const yy=j.y0-Math.sin(p*Math.PI)*j.peak, xx=j.x+j.dir*p*28;
    ctx.save();ctx.translate(xx,yy);ctx.rotate(j.dir*(p-0.5)*1.7);ctx.scale(j.dir,1);
    ctx.fillStyle='#5a727c';ctx.beginPath();ctx.ellipse(0,0,11,4.2,0,0,TAU);ctx.fill();
    ctx.fillStyle='#42585f';ctx.beginPath();ctx.moveTo(-9,0);ctx.lineTo(-15,-4);ctx.lineTo(-15,4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(7,-1,1.1,0,TAU);ctx.fill();ctx.restore();
    if(p<0.13||p>0.87){ctx.fillStyle='rgba(235,248,250,0.5)';for(let k=0;k<3;k++)
      {ctx.beginPath();ctx.arc(j.x+(Math.random()-0.5)*8,j.y0+Math.random()*3,Math.random()*2+1,0,TAU);ctx.fill();}}
  }
  G.jumpers=G.jumpers.filter(j=>j.age<j.dur+0.1);
}
function drawReeds(t,wy){
  for(const rd of DECOR.reeds){
    const x=W-8-rd.x*W*0.18, baseY=H+6, h=(H-wy)*(0.16+rd.h*0.18), sway=Math.sin(t*1.2+rd.k*10)*6;
    reed(x,baseY,h,sway,rd.lean,rd.k>0.5);
  }
}
function reed(x,baseY,h,sway,lean,cattail){
  ctx.lineCap='round';
  ctx.strokeStyle='#456138';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(x,baseY);ctx.quadraticCurveTo(x-12+sway*0.2,baseY-h*0.5,x-18+sway,baseY-h*0.82);ctx.stroke();
  ctx.strokeStyle='#3a5230';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x,baseY);ctx.quadraticCurveTo(x+lean*h+sway*0.3,baseY-h*0.6,x+lean*h*1.3+sway,baseY-h);ctx.stroke();
  if(cattail){ctx.strokeStyle='#6b4a2b';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(x+lean*h*1.3+sway,baseY-h*0.78);ctx.lineTo(x+lean*h*1.3+sway,baseY-h);ctx.stroke();}
}
function drawFireflies(t,wy){
  for(const f of DECOR.fireflies){
    const x=(f.x*W+Math.sin(t*f.sp+f.drift)*32+t*4)%W;
    const y=wy*0.9+f.y*(H-wy)*0.55+Math.cos(t*f.sp*0.8+f.ph)*16;
    const blink=Math.sin(t*2.4+f.ph);
    if(blink>0.3){const a=(blink-0.3)*0.9;
      ctx.fillStyle=`rgba(255,232,120,${a*0.28})`;ctx.beginPath();ctx.arc(x,y,5.5,0,TAU);ctx.fill();
      ctx.fillStyle=`rgba(255,244,170,${a})`;ctx.beginPath();ctx.arc(x,y,2.2,0,TAU);ctx.fill();}
  }
}
function drawOverlay(t){
  // warm cinematic colour grade
  const grade=ctx.createLinearGradient(0,0,0,H);
  grade.addColorStop(0,'rgba(255,178,120,0.06)');grade.addColorStop(0.5,'rgba(255,200,150,0)');grade.addColorStop(1,'rgba(18,38,58,0.12)');
  ctx.fillStyle=grade;ctx.fillRect(0,0,W,H);
  // vignette
  const v=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.36,W/2,H*0.5,Math.max(W,H)*0.78);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(14,10,20,0.34)');
  ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
  // soft lens flare along the sun axis
  const dx=W/2-SUN.x, dy=H/2-SUN.y;
  for(const [d,r,a] of [[0.35,16,0.05],[0.62,8,0.06],[1.05,24,0.04],[1.45,11,0.05]]){
    ctx.fillStyle=`rgba(255,226,182,${a})`;ctx.beginPath();ctx.arc(SUN.x+dx*d,SUN.y+dy*d,r,0,TAU);ctx.fill();}
}

function drawDock(t){
  const wy=waterY(), dx=W*0.26, deckTop=wy-12, deckBot=wy+16, bottom=H;
  // --- pilings standing in the water (water shows between them) ---
  const nP=5, gap=dx/nP;
  for(let i=0;i<nP;i++) drawPiling((i+0.5)*gap, deckBot-4, bottom, wy);
  // diagonal cross-braces for structure
  ctx.strokeStyle='rgba(40,28,16,0.55)';ctx.lineWidth=4;ctx.lineCap='round';
  for(let i=0;i<nP-1;i++){const a=(i+0.5)*gap,b=(i+1.5)*gap;
    ctx.beginPath();ctx.moveTo(a,wy+10);ctx.lineTo(b,wy+36);ctx.stroke();}
  // stringer beam + soft shadow under the deck
  ctx.fillStyle='#4a3320';ctx.fillRect(0,deckBot-6,dx,7);
  ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle='#08222d';ctx.fillRect(0,deckBot,dx,15);ctx.restore();
  // --- deck front face (planks) ---
  const fg=ctx.createLinearGradient(0,deckTop,0,deckBot);fg.addColorStop(0,'#7a5733');fg.addColorStop(1,'#553c24');
  ctx.fillStyle=fg;ctx.fillRect(0,deckTop+7,dx,deckBot-deckTop-7);
  const planks=Math.max(5,Math.round(dx/46)), pw=dx/planks;
  for(let i=0;i<=planks;i++){const px=i*pw;
    ctx.strokeStyle='rgba(28,18,10,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,deckTop+7);ctx.lineTo(px,deckBot);ctx.stroke();
    ctx.fillStyle='rgba(18,12,7,0.5)';ctx.beginPath();ctx.arc(Math.min(dx-3,px+pw*0.5),deckTop+13,1.5,0,TAU);ctx.fill();}
  // --- sunlit deck top ---
  const td=ctx.createLinearGradient(0,deckTop,0,deckTop+9);td.addColorStop(0,'#b3854f');td.addColorStop(1,'#8a6038');
  ctx.fillStyle=td;ctx.fillRect(0,deckTop,dx,9);
  ctx.fillStyle='rgba(255,232,184,0.32)';ctx.fillRect(0,deckTop,dx,2.5);
  ctx.strokeStyle='rgba(40,26,14,0.28)';ctx.lineWidth=1;

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function shade(hex,f){const n=parseInt(hex.slice(1),16);const r=Math.min(255,((n>>16)&255)*f)|0,g=Math.min(255,((n>>8)&255)*f)|0,b=Math.min(255,(n&255)*f)|0;return `rgb(${r},${g},${b})`;}

/* ---------- 6. Reel-in fight ---------- */
function startFight(sp){
  // Reel while it's CALM (green); let go while it RUNS (orange). Timing is faster,
  // but holding straight through ALWAYS lands the fish eventually (kid-proof).
  const diff = sp.rarity==='legendary'?1.0 : sp.rarity==='rare'?0.5 : 0.25;
  const hf = G.hype?G.hype.h:0;                 // 0..1 drama, NOT difficulty
  G.fight={
    prog:0.05, hold:false, diff, elapsed:0, clk:0,
    reelRate:0.55 - diff*0.12,      // line gained while reeling during calm (unchanged)
    runPenalty:0.30 + diff*0.18,    // gentle loss if you reel during a run (unchanged)
    slip:0.05 + diff*0.05,          // tiny drift if you idle while it's calm (unchanged)
    running:false, stateTimer:rnd(1.4,2.2), wob:0, idle:0,
    drama:hf,                       // amplifies thrash + sound + shake only
    broke:false,                    // set when the fish breaches (cinematic finish)
  };
  G.slowmo=0; G.breakFocus=null;
  const fill=el('reelBarFill');if(fill){fill.style.width='5%';fill.classList.remove('tug');}
}
function triggerBreak(f){
  f.broke=true;
  const wy=waterY();
  const bx=(G.activeBobber&&G.activeBobber.x)||W*0.5;
  G.breakFocus={x:bx,y:wy};
  G.slowmo=0.6;
  if(!REDUCED_MOTION)G.shake=Math.max(G.shake,11);
  Sound.splash();buzz(70);
  spawnSplash(bx, wy-4, 34);                 // big surface spray as it breaches
}
function updateFight(dt){
  const f=G.fight;
  if(f.broke){                               // cinematic surface break: ramp decisively, then land
    f.prog=clamp(f.prog+dt*2.4,0,1);
    const fb=el('reelBarFill');if(fb)fb.style.width=(f.prog*100).toFixed(1)+'%';
    if(f.prog>=1)landFish();
    return;
  }
  f.elapsed+=dt;
  f.stateTimer-=dt;
  if(f.stateTimer<=0){
    f.running=!f.running;
    f.stateTimer = f.running ? rnd(0.5,0.9)+f.diff*0.35 : rnd(1.4,2.2);
    if(f.running){ Sound.reelRun(f.drama||0); G.shake=Math.max(G.shake,3+(f.drama||0)*7); buzz(20+((f.drama||0)*40)|0); }
  }
  if(f.hold){
    if(f.running){ f.prog -= f.runPenalty*dt; }        // reeling against a run loses a little line
    else { f.prog += f.reelRate*dt; f.clk-=dt; if(f.clk<=0){Sound.reelTick(); f.clk=0.08-f.prog*0.03;} }
    f.wob += dt*(20+ (f.drama||0)*16); f.idle=0;
  }else{
    if(!f.running) f.prog -= f.slip*dt;                // resting is safe during a run
    if(f.prog<=0.002) f.idle=(f.idle||0)+dt;
  }
  f.prog=clamp(f.prog,0,1);
  const fill=el('reelBarFill');if(fill){fill.style.width=(f.prog*100).toFixed(1)+'%';fill.classList.toggle('tug',f.running);}
  const btn=el('actionBtn');if(btn){btn.textContent=f.running?'✋ LET IT RUN!':'🎣 HOLD TO REEL!';btn.classList.toggle('run',f.running);}
  if(f.prog>=0.86){ triggerBreak(f); return; }          // climactic breach near the top
  if(f.elapsed>32)landFish();                           // safety cap: a fight can never get stuck
  else if((f.idle||0)>3.5)missFish('Reel when it’s green — let go when it runs. Give it another go!');
}
function drawFightUI(){
  const f=G.fight;if(!f)return;
  const wy=waterY();
  const bob=G.activeBobber||{x:W*0.5,y:wy+40};
  const surfaceY=wy-4, deepY=Math.min(H-46, wy+150);
  const fx=bob.x + Math.sin(f.wob*0.6)*12*(f.running?1.9:1);
  const fy=lerp(deepY, surfaceY, f.prog) + (f.running?Math.sin(f.wob*1.3)*9:0);
  // taut line from the active rod tip down to the hooked fish
  const tip=G.activeTip||{x:bob.x,y:wy-70};
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.quadraticCurveTo((tip.x+fx)/2,(tip.y+fy)/2-10,fx,fy);ctx.stroke();
  // the hooked fish rises as a murky shadow — bigger/darker for bigger fish,
  // blurry deep down, sharpening (but never full colour) as it nears the surface.
  const pct=G.hype?G.hype.sizePct:0.4;
  const shadowL=lerp(54,104,pct)*(G.fish&&G.fish.depth<0.2?1.12:1);  // long fish read bigger
  const clarity=clamp((f.prog-0.15)/0.7,0,1);                        // 0 deep .. 1 near top
  ctx.save();ctx.translate(fx,fy);ctx.rotate(-0.5 + Math.sin(f.wob*0.8)*0.22);
  // soft dark blob behind the silhouette adds "depth blur" when deep
  ctx.fillStyle='rgba(8,22,30,'+(0.30*(1-clarity)).toFixed(3)+')';
  ctx.beginPath();ctx.ellipse(0,0,shadowL*0.55,shadowL*0.55*0.42,0,0,TAU);ctx.fill();
  // the shadow itself: a dark-blue tinted silhouette, never the real colours
  const sv={...G.fish,back:'#16313f',mid:'#1d4150',belly:'#2a5566',pattern:null,lat:null,eye:'#0c1a22',glassyEye:false};
  ctx.globalAlpha=lerp(0.55,0.92,clarity);
  drawFish(ctx,sv,0,0,shadowL,-1);
  ctx.globalAlpha=1;ctx.restore();
  // a translucent water veil over the whole shadow, thinning as it rises
  ctx.fillStyle='rgba(34,96,112,'+(0.34*(1-clarity)).toFixed(3)+')';
  ctx.beginPath();ctx.ellipse(fx,fy,shadowL*0.75,shadowL*0.5,0,0,TAU);ctx.fill();
  // surface splash ring as it nears the top
  if(f.prog>0.7){const a=(f.prog-0.7)/0.3;ctx.strokeStyle=`rgba(230,245,250,${0.55*a})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(fx,surfaceY,28*a+8,9*a+3,0,0,TAU);ctx.stroke();}
  // big expanding rings on the cinematic breach
  if(f.broke){
    const a=clamp(G.slowmo/0.6,0,1);                 // 1 -> 0 over the slow-mo
    const rr=lerp(12,84,1-a);
    ctx.strokeStyle=`rgba(240,250,253,${0.75*a+0.08})`;ctx.lineWidth=4;
    ctx.beginPath();ctx.ellipse(fx,surfaceY,rr,rr*0.36,0,0,TAU);ctx.stroke();
    const rr2=lerp(6,54,1-a);
    ctx.strokeStyle=`rgba(255,255,255,${0.5*a})`;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.ellipse(fx,surfaceY,rr2,rr2*0.36,0,0,TAU);ctx.stroke();
  }
  // little caption over the fish
  ctx.fillStyle='#fff';ctx.font='bold 14px "Segoe UI",sans-serif';ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=3;
  const tier=G.hype?G.hype.tier:1;
  let cap;
  if(f.broke) cap=(tier>=3)?'🌊 IT BREACHES!':'🌊 Up it comes!';
  else if(f.running) cap='💪 It\'s running — let go!';
  else if(f.prog<0.33) cap='Something\'s on the line…';
  else if(f.prog<0.70) cap=(tier>=2)?'💪 This one\'s got some weight!':'🎣 Reeling it in…';
  else cap=(tier>=3)?'🌟 WHAT *IS* THAT?!':(tier>=2)?'🔥 IT\'S A BIG ONE!':'Almost up…';
  ctx.strokeText(cap,fx,fy-46);ctx.fillText(cap,fx,fy-46);
}

/* ---------- 7. Game flow ---------- */
function setMode(m){G.mode=m;G.modeT=0;updateUI();}
function cast(){
  Sound.cast();G.lineOut=0;G._splashed=false;setMode('casting');
}
function startCharge(){
  if(G.mode!=='idle') return;
  Sound.init(); G._charge=0; G._chargeDir=1; setMode('charging');
}
function releaseCast(){
  if(G.mode!=='charging') return;
  G.castPower=Math.max(0.28, G._charge||0);
  G._perfect = G.castPower>0.82;
  cast();
}
function pickFish(){
  // one merged pool: sum the old per-spot weights so every species stays catchable
  const pool=[];let total=0;
  for(const sp of FISH){const w=(sp.weights.weeds||0)+(sp.weights.deep||0)+(sp.weights.lure||0);if(w>0){pool.push([sp,w]);total+=w;}}
  let r=Math.random()*total;
  for(const [sp,w] of pool){r-=w;if(r<=0)return sp;}
  return pool[0][0];
}
function onBite(){
  G.fish=pickFish();
  G.fishSize=rollSize(G.fish);
  G.hype=computeHype(G.fish,G.fishSize);
  Sound.bite(G.hype?G.hype.h:0);
  G.hookWindow=1.6;setMode('bite');
}
function setHook(){
  if(G.mode!=='bite')return;
  G.rodBend[G.turn]=1;startFight(G.fish);setMode('fighting');
}
/*<computeHype>*/
function computeHype(sp,size){
  const span=Math.max(0.001,sp.maxLen-sp.minLen);
  const sizePct=clamp((size.len-sp.minLen)/span,0,1);
  const rarityBoost=sp.rarity==='legendary'?0.60:sp.rarity==='rare'?0.30:0;
  const h=clamp(sizePct*0.7+rarityBoost,0,1);
  let tier=1;
  if(sp.rarity==='legendary'||sizePct>=0.90||(sp.rarity==='rare'&&sizePct>=0.75))tier=3;
  else if(sp.rarity==='rare'||sizePct>=0.75)tier=2;
  else if(sp.rarity==='common'&&sizePct<0.25)tier=0;
  return {h,tier,sizePct};
}
/*</computeHype>*/
/* ----- size medals (derived from a species' best length) ----- */
const MEDAL_TH={bronze:0.50, silver:0.75, gold:0.92};
const MEDAL_EMO=['','🥉','🥈','🥇'];
const MEDAL_NAME=['','Bronze','Silver','Gold'];
function medalForLen(sp,len){
  if(!sp||len<=0)return 0;
  const span=Math.max(0.001,sp.maxLen-sp.minLen), pct=(len-sp.minLen)/span;
  return pct>=MEDAL_TH.gold?3:pct>=MEDAL_TH.silver?2:pct>=MEDAL_TH.bronze?1:0;
}
function medalTally(){const t=[0,0,0,0];for(const id in G.collection){const sp=FISH_BY_ID[id];if(sp)t[medalForLen(sp,(G.collection[id].bestLen)||0)]++;}return t;}
function anyRarity(c,r){for(const id in c){const sp=FISH_BY_ID[id];if(sp&&sp.rarity===r)return true;}return false;}
function bestMedal(c){let m=0;for(const id in c){const sp=FISH_BY_ID[id];if(sp){const mm=medalForLen(sp,c[id].bestLen||0);if(mm>m)m=mm;}}return m;}
function distinctAnglers(c){const s=new Set();for(const id in c){const r=c[id];if(r&&r.firstBy)s.add(r.firstBy);}return Math.min(s.size,2);}

/* ----- goals / challenges (all derived from the collection) ----- */
const GOALS=[
  {id:'first', name:'First Catch',           hint:'Land your very first fish',     cur:c=>Math.min(Object.keys(c).length,1), max:1},
  {id:'five',  name:'Getting the Hang of It',hint:'Catch 5 different species',      cur:c=>Math.min(Object.keys(c).length,5), max:5},
  {id:'ten',   name:'Seasoned Angler',       hint:'Catch 10 different species',     cur:c=>Math.min(Object.keys(c).length,10), max:10},
  {id:'all',   name:'Master Angler',         hint:'Catch every species in the lake',cur:c=>Object.keys(c).length, max:FISH.length},
  {id:'rare',  name:'Something Special',     hint:'Land a Rare fish',               cur:c=>anyRarity(c,'rare')?1:0, max:1},
  {id:'legend',name:'The Big Leagues',       hint:'Land a Legendary',               cur:c=>anyRarity(c,'legendary')?1:0, max:1},
  {id:'silver',name:'Silver Lining',         hint:'Earn a Silver medal',            cur:c=>bestMedal(c)>=2?1:0, max:1},
  {id:'gold',  name:'Gold Standard',         hint:'Earn a Gold medal',              cur:c=>bestMedal(c)>=3?1:0, max:1},
  {id:'pike30',name:'Water Wolf',            hint:'Land a 30″+ Northern Pike',      cur:c=>(((c.pike&&c.pike.bestLen)||0)>=30)?1:0, max:1},
  {id:'duo',   name:'Family Affair',         hint:'Dad and Everett each land one',  cur:c=>distinctAnglers(c), max:2},
];
function goalDoneSet(c){const s={};for(const g of GOALS)if(g.cur(c)>=g.max)s[g.id]=true;return s;}
function goalsDoneCount(c){let n=0;for(const g of GOALS)if(g.cur(c)>=g.max)n++;return n;}

function rollSize(sp){
  const len=sp.minLen+(sp.maxLen-sp.minLen)*Math.pow(Math.random(),1.6);
  const wt=Math.max(0.1,Math.pow(len,3)*sp.wt);
  return {len:+len.toFixed(1),wt:+wt.toFixed(1)};
}
function landFish(){
  const sp=G.fish, sz=G.fishSize||rollSize(sp);
  const hype=G.hype||computeHype(sp,sz);
  const goalsBefore=goalDoneSet(G.collection);          // snapshot BEFORE recording the catch
  Sound.splash();spawnSplash(G.activeBobber.x,G.activeBobber.y,18+hype.tier*6);
  // record (capture previous best BEFORE updating, for the size meter + medal)
  const rec=G.collection[sp.id]||{count:0,bestLen:0,bestWt:0,firstBy:G.turn};
  const prevBest=rec.bestLen;
  const isRecord=sz.len>rec.bestLen;
  rec.count++;if(sz.len>rec.bestLen)rec.bestLen=sz.len;if(sz.wt>rec.bestWt)rec.bestWt=sz.wt;
  G.collection[sp.id]=rec;save();
  // medals + newly completed goals
  const prevMedal=medalForLen(sp,prevBest), medal=medalForLen(sp,sz.len), medalUp=medal>prevMedal;
  const goalsAfter=goalDoneSet(G.collection);
  const goalsHit=GOALS.filter(g=>goalsAfter[g.id]&&!goalsBefore[g.id]).map(g=>g.name);
  // celebration scales with the moment — a medal bump or a goal hit makes it bigger
  const big=medalUp||goalsHit.length>0;
  if(!REDUCED_MOTION)G.shake=Math.max(G.shake,6+hype.tier*4+(big?4:0));
  buzz(40+hype.tier*30);
  const conf=50+hype.tier*40+(medalUp?medal*25:0)+(goalsHit.length?40:0);
  const goldPal=['#ffd75a','#ffe14d','#f6b352','#fff3c0','#e0913a'];
  const fanTier=Math.max(hype.tier, medalUp?medal:0);
  setTimeout(()=>{Sound.fanfare(fanTier);spawnConfetti(conf, (hype.tier>=3||medal>=3)?goldPal:undefined);},220);
  G.caught={sp,sz,by:G.turn,isNew:rec.count===1,isRecord,hype,prevBest,medal,medalUp,goalsHit};
  G.fight=null;
  setMode('result');
  showCard();
}
function missFish(msg){
  Sound.fail();
  // a teasing near-miss when a BIG one throws the hook — drives "one more cast"
  if(!msg && G.hype && G.hype.tier>=2){
    msg = G.hype.tier>=3 ? '😱 SO CLOSE — a MONSTER spit the hook!' : '😮 That was a big one — it threw the hook!';
  }
  G.fight=null;G.fish=null;G.fishSize=null;G.hype=null;
  toast(msg||'Aw, it nibbled and let go.');
  setMode('result');
  // brief pause then next turn
  setTimeout(()=>{ if(G.mode==='result'){nextTurn();} },1700);
}
function nextTurn(){
  G.rodBend[G.turn]=0;
  G.turn=G.turn==='dad'?'son':'dad';
  G.fish=null;G.fishSize=null;G.hype=null;G.caught=null;G.breakFocus=null;G.slowmo=0;
  hideCard();setMode('idle');
  showTurnBanner();
}
let _turnBannerTimer=0;
function showTurnBanner(){
  const a=ANGLERS[G.turn], tb=el('turnBanner');if(!tb)return;
  tb.innerHTML=`<span class="em">${a.emoji}</span> ${a.name}, you're up!`;
  tb.style.borderColor=a.color;
  tb.classList.add('show');
  clearTimeout(_turnBannerTimer);
  _turnBannerTimer=setTimeout(()=>tb.classList.remove('show'),1600);
}

/* particles */
function spawnSplash(x,y,n){for(let i=0;i<n;i++)G.splashes.push({x,y,r:rnd(2,5),vx:rnd(-1.6,1.6),vy:rnd(-3.4,-0.5),life:1});}
function spawnConfetti(n=70,cols){const cx=W/2,cy=H*0.4;
  cols=cols||['#f6b352','#e2607e','#7fd47f','#5fa8e0','#c558d6','#ffe14d'];
  for(let i=0;i<n;i++)G.confetti.push({x:cx+rnd(-40,40),y:cy,vx:rnd(-4,4),vy:rnd(-7,-2),rot:rnd(TAU),vr:rnd(-.3,.3),col:pick(cols),life:1});}
function updateParticles(dt){
  for(const s of G.splashes){s.x+=s.vx;s.y+=s.vy;s.vy+=0.18;s.life-=dt*1.4;}
  G.splashes=G.splashes.filter(s=>s.life>0);
  for(const c of G.confetti){c.x+=c.vx;c.y+=c.vy;c.vy+=0.22;c.rot+=c.vr;c.life-=dt*0.5;}
  G.confetti=G.confetti.filter(c=>c.life>0 && c.y<H+40);
}

/* ---------- 8. UI wiring ---------- */
const el=id=>document.getElementById(id);
const REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function buzz(ms){ try{ if(!Sound.muted && navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
function closeLog(){el('logPanel').classList.remove('show');}

  el('goalsPanel').classList.add('show');

    mid.appendChild(nm);mid.appendChild(ht);
    const bw=document.createElement('div');bw.style.cssText='width:84px;height:10px;border-radius:999px;background:#efe2cb;overflow:hidden;flex:0 0 auto;';

function toggleMute(){Sound.setMuted(!Sound.muted);el('muteBtn').textContent=Sound.muted?'🔇':'🔊';}
function dismissCard(){
  if(!el('catchCard').classList.contains('show'))return;
  if(G.t < (G.cardReadyAt||0))return;          // must-see-your-fish lockout
  nextTurn();
}
// ONE context button — cast / set hook / reel — mirrors the spacebar
el('actionBtn').addEventListener('pointerdown',e=>{e.preventDefault();Sound.init();
  if(G.mode==='idle')startCharge();
  else if(G.mode==='bite')setHook();
  else if(G.mode==='fighting'&&G.fight)G.fight.hold=true;
});
el('logBtn').onclick=openLog;
el('logClose').onclick=closeLog;
el('goalsBtn').onclick=openGoals;
el('goalsClose').onclick=closeGoals;
el('cardBtn').onclick=dismissCard;
el('muteBtn').onclick=toggleMute;

function updateUI(){
  const a=ANGLERS[G.turn];
  el('turn').innerHTML=`<span class="who"><span class="dot" style="background:${a.color}"></span>${a.emoji} ${a.name}'s turn</span>`;
  el('progress').textContent=`📘 ${caughtCount()}/${FISH.length}`;
  const show=(id,v)=>el(id).classList.toggle('hidden',!v);
  const m=G.mode, idle=m==='idle', charging=m==='charging';
  // one context button + the two meters
  const btn=el('actionBtn');
  show('actionBtn', idle||charging||m==='bite'||m==='fighting');
  show('castUI',charging);
  show('reelBarWrap',m==='fighting');
  btn.classList.toggle('pulse', m==='bite');
  btn.classList.toggle('reel', m==='fighting');
  if(m!=='fighting')btn.classList.remove('run');
  if(idle) btn.textContent='HOLD TO CAST 🎣';
  else if(charging) btn.textContent='RELEASE! 🎣';
  else if(m==='bite') btn.textContent='SET THE HOOK!';
  else if(m==='fighting') btn.textContent='🎣 HOLD TO REEL!';
  // hint text
  let h='';
  if(idle) h=`Hold SPACE (or the button) to power up your cast, ${a.name}!`;
  else if(charging) h='Release to cast — stop in the green zone for a perfect cast!';
  else if(m==='casting') h=G._perfect?'🎯 Perfect cast!':'Casting out…';
  else if(m==='waiting') h='Watch the bobber… wait for a bite.';
  else if(m==='bite') h='A bite! Tap SPACE (or the button) to set the hook!';
  else if(m==='fighting') h="Hold to reel while it's GREEN — let go when it turns ORANGE!";
  else h='';
  el('hint').textContent=h;
  el('hint').style.opacity=h?'1':'0';
}

let toastTimer=0;
function toast(msg){el('hint').textContent=msg;el('hint').style.opacity='1';}

function showCard(){
  el('catchCard').classList.add('show');   // show first — never let a draw error hide the catch
  // must-see-your-fish: lock dismissal briefly so mashed space can't skip the reveal
  G.cardReadyAt=G.t+0.8;
  const nb=el('cardBtn');if(nb){nb.disabled=true;nb.style.opacity='0.5';
    setTimeout(()=>{if(el('catchCard').classList.contains('show')){nb.disabled=false;nb.style.opacity='1';}},800);}
  try{
    const {sp,sz,by,isNew,isRecord}=G.caught;
    const tier=(G.caught.hype&&G.caught.hype.tier)||1;
    const md=G.caught.medal||0, mdUp=G.caught.medalUp;
    el('cardBanner').textContent =
        (mdUp&&md>=1)           ? `${MEDAL_EMO[md]} ${MEDAL_NAME[md].toUpperCase()} MEDAL!`
      : sp.rarity==='legendary' ? '🌟 LEGENDARY!'
      : tier>=3                 ? '🏆 LUNKER!'
      : isNew                   ? '✨ New species!'
      : isRecord                ? '⭐ New personal best!'
      :                           'Nice catch!';
    el('cardName').textContent=sp.name;
    const rar=RARITY[sp.rarity];
    const rEl=el('cardRar');rEl.textContent=rar.label;rEl.style.background=rar.c;
    el('cardLen').textContent=sz.len+'"';
    el('cardWt').textContent=sz.wt+' lb';
    const hp=G.caught.hype||computeHype(sp,sz);
    el('cardSizeFill').style.width=(hp.sizePct*100).toFixed(0)+'%';
    el('cardSizePct').textContent = hp.sizePct>=0.90?'Top 10%! 🤩' : hp.sizePct>=0.75?'A big one!' : '';
    const meterSpan=Math.max(0.001,sp.maxLen-sp.minLen);
    const bestPct=clamp(((G.caught.prevBest||0)-sp.minLen)/meterSpan,0,1);
    const bestEl=el('cardSizeBest');
    if((G.caught.prevBest||0)>0){bestEl.style.display='block';bestEl.style.left=(bestPct*100).toFixed(0)+'%';}
    else{bestEl.style.display='none';}
    // medal line for this catch
    const me=el('cardMedal');
    if(md>0){ me.textContent=`${MEDAL_EMO[md]} ${MEDAL_NAME[md]} catch${mdUp?' — NEW! ✨':'!'}`;
      me.style.color = md>=3?'#d39a1e':md>=2?'#7f8086':'#a9743e'; }
    else { me.textContent='No medal yet — a bigger one earns a 🥉'; me.style.color='#9a8b76'; }
    // newly-completed goal(s)
    const gh=G.caught.goalsHit||[], ge=el('cardGoal');
    if(gh.length){ ge.textContent=`🎯 Goal complete: ${gh[0]}${gh.length>1?` (+${gh.length-1} more)`:''}!`; ge.style.display='block'; }
    else ge.style.display='none';
    el('cardFlav').textContent=pick(sp.flav);
    const who=ANGLERS[by]||ANGLERS.dad;
    el('cardBy').textContent=`Reeled in by ${who.emoji} ${who.name}`;
    const cc=el('cardFish'),cx2=cc.getContext('2d');
    const L=Math.min(sz.len*9+150, fitL(sp,480,250));
    const sv={...sp,back:'#16313f',mid:'#1d4150',belly:'#2a5566',pattern:null,lat:null,eye:'#0c1a22',glassyEye:false};
    const t0=performance.now();
    (function develop(now){
      if(!el('catchCard').classList.contains('show'))return;          // bail if dismissed
      const p=Math.min(1,(now-t0)/360);
      cx2.setTransform(1,0,0,1,0,0);cx2.clearRect(0,0,cc.width,cc.height);
      const scale=lerp(0.86,1,p), Ls=L*scale;
      cx2.globalAlpha=1;
      drawFish(cx2,sv,cc.width/2,cc.height/2,Ls,-1);                   // shadow underneath
      cx2.globalAlpha=p;                                              // full colour fades in
      drawFish(cx2,sp,cc.width/2,cc.height/2,Ls,-1);
      cx2.globalAlpha=1;
      if(p<1)requestAnimationFrame(develop);
    })(t0);
  }catch(e){}
}
function hideCard(){el('catchCard').classList.remove('show');}

function openLog(){
  el('logPanel').classList.add('show');   // show first — never let a draw error hide the logbook

      cell.appendChild(nm);cell.appendChild(cs);

}
function drawFishSilhouette(ctx,sp,cx,cy,L){
  // crude shadow version: reuse drawFish but tint everything dark
  const sv={...sp,back:'#9aa0a6',mid:'#9aa0a6',belly:'#9aa0a6',pattern:null,lat:null,eye:'#888',glassyEye:false};
  drawFish(ctx,sv,cx,cy,L,-1);
}

/* pointer: tap canvas to set hook; hold to reel */
function pointerDown(e){
  Sound.init();
  if(G.mode==='bite'){setHook();}
  else if(G.mode==='fighting'&&G.fight){G.fight.hold=true;}
}
function pointerUp(){if(G.fight)G.fight.hold=false; if(G.mode==='charging')releaseCast();}
cv.addEventListener('pointerdown',pointerDown);
window.addEventListener('pointerup',pointerUp);

/* full keyboard control */
function onKeyDown(e){
  const c=e.code;
  // dialogs first
  if(el('logPanel').classList.contains('show')){
    if(c==='Escape'||c==='Enter'||c==='KeyL'){closeLog();e.preventDefault();}
    return;
  }
  if(el('goalsPanel').classList.contains('show')){
    if(c==='Escape'||c==='Enter'||c==='KeyG'){closeGoals();e.preventDefault();}
    return;
  }
  if(el('catchCard').classList.contains('show')){
    if((c==='Enter'||c==='Space')&&!e.repeat){dismissCard();e.preventDefault();}  // fresh press + lockout
    return;
  }
  // global shortcuts
  if(c==='KeyM'){toggleMute();return;}
  if(c==='KeyL'){openLog();e.preventDefault();return;}
  if(c==='KeyG'){openGoals();e.preventDefault();return;}
  Sound.init();
  if(G.mode==='idle'){
    if(c==='Space'){ startCharge(); e.preventDefault(); }
    else if(c==='Enter'){ G.castPower=0.82;G._perfect=false;cast(); e.preventDefault(); }
  } else if(G.mode==='bite'){
    if((c==='Space'||c==='Enter'||c==='ArrowUp')&&!e.repeat){setHook();e.preventDefault();}
  } else if(G.mode==='fighting'){
    if((c==='Space'||c==='ArrowUp'||c==='Enter')&&G.fight){G.fight.hold=true;e.preventDefault();}
  }
}
function onKeyUp(e){
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='Enter')&&G.fight)G.fight.hold=false;
  if(e.code==='Space'&&G.mode==='charging')releaseCast();
}
window.addEventListener('keydown',onKeyDown);
window.addEventListener('keyup',onKeyUp);

/* ---------- main loop ---------- */
let last=0;
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000||0);last=now;
  G.t=now/1000;G.modeT+=dt;
  // mode timers
  if(G.mode==='charging'){
    G._charge=(G._charge||0)+G._chargeDir*dt*1.5;
    if(G._charge>=1){G._charge=1;G._chargeDir=-1;}
    else if(G._charge<=0){G._charge=0;G._chargeDir=1;}
    const cf=el('castBarFill');if(cf){cf.style.width=(G._charge*100).toFixed(0)+'%';cf.classList.toggle('perfect',G._charge>0.82);}
  }
  else if(G.mode==='casting'){
    G.lineOut=Math.min(1,G.lineOut+dt*1.25);
    if(G.lineOut>=1 && !G._splashed){G._splashed=true; if(G.activeBobber)spawnSplash(G.activeBobber.x,G.activeBobber.y,12); Sound.plop();}
    if(G.modeT>0.95){G._splashed=false; setMode('waiting'); G.biteAt=G._perfect?rnd(0.7,2.0):rnd(1.2,3.8);}
  }
  else if(G.mode==='waiting'){if(G.modeT>G.biteAt)onBite();}
  else if(G.mode==='bite'){if(G.modeT>G.hookWindow)missFish();}
  else if(G.mode==='fighting'){ const ts=G.slowmo>0?0.32:1; updateFight(dt*ts); }
  // rod bend easing (with a forward whip on the cast)
  for(const k of ['dad','son']){
    const me=(k===G.turn);
    const target= me ? (G.mode==='fighting'?1 : G.mode==='bite'?0.4 : G.mode==='casting'?0.85*(1-G.lineOut) : 0) : 0;
    G.rodBend[k]+=(target-G.rodBend[k])*Math.min(1,dt*10);
    G.bob[k]=Math.sin(G.t*2+ (k==='son'?1:0))*2;
  }
  updateParticles(dt);

  // render (with decaying screen shake + cinematic zoom; disabled for reduced-motion users)
  G.shake=Math.max(0,G.shake-dt*22);
  G.slowmo=Math.max(0,G.slowmo-dt);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(!REDUCED_MOTION && G.shake>0.1){
    const a=G.shake;ctx.translate((Math.random()*2-1)*a,(Math.random()*2-1)*a);
  }
  if(!REDUCED_MOTION && G.slowmo>0 && G.breakFocus){
    const k=1-(G.slowmo/0.6);                       // 0..1 through the slow-mo
    const z=1+0.09*Math.sin(k*Math.PI);             // ease 1 -> 1.09 -> 1
    ctx.translate(G.breakFocus.x,G.breakFocus.y);ctx.scale(z,z);ctx.translate(-G.breakFocus.x,-G.breakFocus.y);
  }
  drawScene(G.t);
  drawOverlay(G.t);
  if(G.mode==='fighting')drawFightUI();
  ctx.restore();
  requestAnimationFrame(frame);
}

/* ---------- boot ---------- */
load();resize();updateUI();showTurnBanner();
window.addEventListener('pointerdown',()=>Sound.init(),{once:true});
requestAnimationFrame(frame);
</script>
